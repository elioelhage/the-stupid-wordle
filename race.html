<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="theme-color" content="#121213" />
	<title>Wordle Unbound — Race Lobby</title>
	<link rel="stylesheet" href="race.css" />
</head>
<body>
	<main class="race-page">
		<header class="race-top">
			<a href="index.html" class="race-back">← Back</a>
			<h1>Race Lobby</h1>
			<p class="race-description">1v1 races are real-time and unlimited guesses. Create a room, share the code, then both players ready up to start.</p>
		</header>

		<section class="race-card" aria-label="Race room actions">
			<h2>Create or Join</h2>
			<p class="race-subtext">Create a room to host, or join with a 6-character code.</p>

			<div class="race-actions">
				<button id="create-room-btn" class="create-room-btn" type="button">Create Room</button>
				<div class="join-row">
					<input id="join-code" type="text" maxlength="6" placeholder="ABC123" aria-label="Room code" />
					<button type="button" class="join-btn">Join</button>
				</div>
			</div>
		</section>
	</main>

	<script src="race.js"></script>
</body>
</html>
