<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Stupid Wordle</title>
  <link rel="icon" href="puzzle.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header class="topbar">
        <div>
          <p class="eyebrow">Daily themed word game</p>
          <h1>THE STUPID WORDLE</h1>
        </div>

        <div class="top-actions">
          <button id="hint-button" class="hint-button">💡 Hint</button>
          <div id="status" class="badge"></div>
        </div>
      </header>

      <div id="message-board"></div>
      <div id="lookup-status" class="lookup-status hidden">Checking dictionary...</div>

      <div id="grid" class="grid"></div>
      <div id="keyboard" class="keyboard"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 Made by Elio El Hage</p>
    <p>Archive: 276 words</p>
  </footer>

  <div id="end-modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="end-title"></h2>
      <p>Next word in:</p>
      <div id="countdown"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
