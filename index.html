<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#121213" />
  <title>The Stupid Wordle</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236aaa64'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-size='60' fill='white' font-family='sans-serif' font-weight='bold'>W</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar__left">
        <p class="eyebrow">Daily Word</p>
        <div class="title-wrap">
          <svg class="title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <path d="M3 9h18"></path>
            <path d="M9 21V9"></path>
          </svg>
          <h1>The Stupid Wordle</h1>
        </div>
        <p class="author-credit">Made by Elio El Hage</p>
      </div>

      <div class="topbar__right">
        <button id="hint-button" class="icon-button hint-button" type="button" aria-label="Hint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18h6"></path>
            <path d="M10 22h4"></path>
            <path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A6 6 0 1 0 7.5 11.5c.76.76 1.23 1.52 1.41 2.5"></path>
          </svg>
          <span id="hint-badge" class="hint-badge">2</span>
        </button>
        <button id="theme-toggle" class="icon-button" type="button" aria-label="Switch to light mode">
          <svg id="theme-icon" viewBox="0 0 24 24" aria-hidden="true"></svg>
        </button>
      </div>
    </header>

    <main class="game" id="game">
      <p id="meta-line" class="meta-line"></p>

      <section class="board-wrap" aria-label="Word board">
        <div id="board" class="board" aria-live="polite"></div>
      </section>

      <p id="message" class="message" aria-live="polite"></p>

      <section class="keyboard-wrap" aria-label="On-screen keyboard">
        <div id="keyboard" class="keyboard"></div>
      </section>
    </main>
  </div>

  <div id="end-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="end-title">
    <div class="modal__card">
      <p id="end-kicker" class="modal__kicker">Round complete</p>
      <h2 id="end-title" class="modal__title">Nice work.</h2>
      <p id="countdown" class="modal__countdown"></p>
      <button id="close-modal" class="primary-button" type="button">Continue</button>
    </div>
  </div>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
