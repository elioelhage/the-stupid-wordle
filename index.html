<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121213" />
  <title>The Stupid Wordle</title>
  <link rel="icon" href="puzzle.png"
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand__icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" role="img" aria-hidden="true">
            <rect width="64" height="64" rx="14"></rect>
            <rect x="12" y="12" width="16" height="16" rx="4"></rect>
            <rect x="36" y="12" width="16" height="16" rx="4" class="brand__tile--muted"></rect>
            <rect x="12" y="36" width="16" height="16" rx="4" class="brand__tile--muted"></rect>
            <rect x="36" y="36" width="16" height="16" rx="4"></rect>
          </svg>
        </div>

        <div class="brand__text">
          <p class="eyebrow">Daily Word</p>
          <h1>The Stupid Wordle</h1>
          <p class="byline">Made by Elio El Hage</p>
        </div>
      </div>

      <div class="topbar__actions">
        <button id="hint-button" class="icon-button" type="button" aria-label="Show a hint">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M12 16.5v.1"></path>
            <path d="M9.8 9.3a2.4 2.4 0 1 1 3.5 2.1c-.9.5-1.3 1-1.3 2v.3"></path>
          </svg>
        </button>

        <button id="theme-toggle" class="icon-button" type="button" aria-label="Switch to light mode">
          <svg id="theme-icon" viewBox="0 0 24 24" aria-hidden="true"></svg>
        </button>
      </div>
    </header>

    <main class="game" id="game">
      <section class="status-card" aria-label="Game info">
        <p id="meta-line" class="meta-line">5 letters · 6 tries</p>

        <div id="tap-tip" class="tip-banner" aria-live="polite">
          <span>Tap the board or keyboard to type.</span>
          <button id="dismiss-tip" class="tip-close" type="button" aria-label="Dismiss tip">×</button>
        </div>
      </section>

      <section class="board-wrap" aria-label="Word board">
        <div id="board" class="board" aria-live="polite"></div>
      </section>

      <p id="message" class="message" aria-live="polite"></p>

      <section class="keyboard-wrap" aria-label="On-screen keyboard">
        <div id="keyboard" class="keyboard"></div>
      </section>
    </main>
  </div>

  <input
    id="capture-input"
    class="capture-input"
    type="text"
    inputmode="text"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="characters"
    spellcheck="false"
    aria-label="Word input"
  />

  <div id="end-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="end-title">
    <div class="modal__card">
      <p id="end-kicker" class="modal__kicker">Round complete</p>
      <h2 id="end-title" class="modal__title">Nice work.</h2>
      <p id="countdown" class="modal__countdown"></p>
      <button id="close-modal" class="primary-button" type="button">Continue</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
